site:
  title: Applied Alchemy
  url: https://www.startupctobook.com
  start_page: ROOT::index.adoc
  robots: |
    User-agent: *
    Allow: /

    User-agent: GPTBot
    Allow: /

    User-agent: OAI-SearchBot
    Allow: /

    User-agent: ChatGPT-User
    Allow: /

    User-agent: ClaudeBot
    Allow: /

    User-agent: Claude-SearchBot
    Allow: /

    User-agent: PerplexityBot
    Allow: /

    User-agent: Google-Extended
    Allow: /

    User-agent: Applebot-Extended
    Allow: /

    Sitemap: https://www.startupctobook.com/sitemap.xml

antora:
  extensions:
    - require: ./lib/llms-txt-generator
      subtitle: "The Startup CTO's Field Guide to Building Technology Companies from Nothing"
      description: "Applied Alchemy is a field guide for startup CTOs, mapping the transformation from coder to manager to director to strategist across 17 chapters covering technical decisions, team building, business communication, AI, burnout, and leadership transitions."

content:
  sources:
    - url: .
      branches: HEAD
      start_path: docs

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: supplemental-ui

asciidoc:
  attributes:
    page-toclevels: 2

output:
  dir: build/site
